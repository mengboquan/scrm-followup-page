<script>
document.addEventListener('DOMContentLoaded', function() {
const pad = function(value) {
return String(value).padStart(2, '0');
};

const taskStatusMeta = {
api: { label: 'API触发', className: 'status-pending' },
sent: { label: '已触达', className: 'status-sent' },
read: { label: '已学习', className: 'status-read' },
dropped: { label: '已脱落', className: 'status-dropped' }
};

const drugOptions = ['健民生血片', '健脾生血颗粒', '小儿宝泰康', '复方黄柏液', '雌二醇凝胶'];
const nicknameRoots = ['康康', '安安', '乐乐', '晴晴', '依依', '宁宁', '甜甜', '小满', '小葵', '沐沐', '清清', '心心'];
const statsStaffs = ['王芸星', '高露遥', '张媛媛', '黄晓燕', '陈星雅', '高雪纯'];
const followupDateRange = { startDay: 1, endDay: 17 };
const dailyTaskRange = { min: 60, max: 100 };
const droppedTaskLimit = 13;
const dailyUnreadTaskRange = { min: 2, max: 5 };
const statsMinDate = '2026-04-01';
const statsMaxDate = '2026-04-17';
const drugColors = {
'健民生血片': '#EF4444',
'健脾生血颗粒': '#8B5CF6',
'小儿宝泰康': '#F59E0B',
'复方黄柏液': '#10B981',
'雌二醇凝胶': '#3B82F6'
};

function createSeededRandom(seed) {
let state = seed % 2147483647;
if (state <= 0) {
state += 2147483646;
}
return function() {
state = state * 16807 % 2147483647;
return (state - 1) / 2147483646;
};
}

const seededRandom = createSeededRandom(20260417);

function randomInt(min, max) {
return min + Math.floor(seededRandom() * (max - min + 1));
}

function pickRandom(list) {
return list[Math.floor(seededRandom() * list.length)];
}

function shuffleArray(list) {
const clonedList = list.slice();
for (let index = clonedList.length - 1; index > 0; index -= 1) {
const swapIndex = Math.floor(seededRandom() * (index + 1));
const current = clonedList[index];
clonedList[index] = clonedList[swapIndex];
clonedList[swapIndex] = current;
}
return clonedList;
}

function buildBalancedSequence(list, count) {
const result = [];
while (result.length < count) {
const cycle = shuffleArray(list);
cycle.forEach(function(item) {
if (result.length < count) {
result.push(item);
}
});
}
return result;
}

function buildTaskMobile(index) {
const suffix = String(100000000 + index * 7919 + randomInt(0, 999)).slice(-9);
return `1${3 + (index % 6)}${suffix}`;
}

function setTaskStatus(task, statusKey) {
const statusMeta = taskStatusMeta[statusKey];
task.statusKey = statusKey;
task.statusText = statusMeta.label;
task.statusClass = statusMeta.className;
task.actionType = statusKey === 'dropped' ? 'retry' : 'detail';
}

function applyDroppedTaskLimit(tasks) {
const candidateTaskGroups = new Map();
tasks.forEach(function(task) {
if (task.statusKey === 'read' || task.statusKey === 'sent') {
if (!candidateTaskGroups.has(task.sendTimeValue)) {
candidateTaskGroups.set(task.sendTimeValue, []);
}
candidateTaskGroups.get(task.sendTimeValue).push(task);
}
});

const keepDroppedTaskIds = new Set();
const datePickRandom = createSeededRandom(20260418);
const sortedDates = Array.from(candidateTaskGroups.keys()).map(function(dateKey) {
return {
dateKey,
order: datePickRandom()
};
}).sort(function(a, b) {
return a.order - b.order || a.dateKey.localeCompare(b.dateKey);
}).map(function(item) {
return item.dateKey;
});

while (keepDroppedTaskIds.size < droppedTaskLimit) {
let hasRemainingTask = false;
sortedDates.forEach(function(dateKey) {
if (keepDroppedTaskIds.size >= droppedTaskLimit) {
return;
}
const sameDayTasks = candidateTaskGroups.get(dateKey) || [];
if (sameDayTasks.length) {
const preferredIndex = sameDayTasks.findIndex(function(task) {
return task.statusKey === 'read';
});
const dropIndex = preferredIndex >= 0 ? preferredIndex : 0;
const task = sameDayTasks.splice(dropIndex, 1)[0];
if (task) {
keepDroppedTaskIds.add(task.id);
hasRemainingTask = true;
}
}
});
if (!hasRemainingTask) {
break;
}
}

tasks.forEach(function(task) {
if (keepDroppedTaskIds.has(task.id)) {
setTaskStatus(task, 'dropped');
}
});
}

function formatDateLabel(dateValue) {
return `4月${Number(dateValue.slice(-2))}日`;
}

function parseDateValue(dateValue) {
const parts = dateValue.split('-').map(Number);
return new Date(parts[0], parts[1] - 1, parts[2]);
}

function formatDateValue(dateObject) {
return `${dateObject.getFullYear()}-${pad(dateObject.getMonth() + 1)}-${pad(dateObject.getDate())}`;
}

function shiftDateValue(dateValue, dayOffset) {
const dateObject = parseDateValue(dateValue);
dateObject.setDate(dateObject.getDate() + dayOffset);
return formatDateValue(dateObject);
}

function formatStatsRangeLabel(startDate, endDate) {
return `${formatDateLabel(startDate)}-${formatDateLabel(endDate)}`;
}

function createTaskList() {
const tasks = [];
let sequence = 1;
for (let day = followupDateRange.startDay; day <= followupDateRange.endDay; day += 1) {
const dailyCount = randomInt(dailyTaskRange.min, dailyTaskRange.max);
const unreadCount = randomInt(dailyUnreadTaskRange.min, dailyUnreadTaskRange.max);
const readCount = dailyCount - unreadCount;
const dailyStatusPool = shuffleArray(
new Array(readCount).fill('read')
.concat(new Array(unreadCount).fill('sent'))
);
const dailyDrugPool = buildBalancedSequence(drugOptions, dailyCount);
const dailyStaffPool = buildBalancedSequence(statsStaffs, dailyCount);
for (let dailyIndex = 0; dailyIndex < dailyCount; dailyIndex += 1) {
const hour = randomInt(8, 21);
const minute = randomInt(0, 59);
const drugName = dailyDrugPool[dailyIndex];
const courseDay = randomInt(1, 21);
const nickname = `${pickRandom(nicknameRoots)}${pad(randomInt(1, 99))}`;
const wechatId = `wx_follow_${pad(day)}${1000 + sequence}`;
const statusKey = dailyStatusPool[dailyIndex];
const statusMeta = taskStatusMeta[statusKey];
tasks.push({
id: sequence,
drugName,
courseText: `第 ${courseDay} 天`,
wechatNickname: nickname,
wechatId,
mobile: buildTaskMobile(sequence),
sendTime: `2026/04/${pad(day)} ${pad(hour)}:${pad(minute)}`,
sendTimeValue: `2026-04-${pad(day)}`,
staffName: dailyStaffPool[dailyIndex],
statusKey,
statusText: statusMeta.label,
statusClass: statusMeta.className,
actionType: statusKey === 'dropped' ? 'retry' : 'detail',
detailTitle: `${drugName}${courseDay}天随访详情`,
detailUrl: `https://demo.example.com/followup/task/${3000 + sequence}`,
checked: false,
loading: false
});
sequence += 1;
}
}
const sortedTasks = tasks.sort(function(a, b) {
return b.sendTime.localeCompare(a.sendTime) || b.id - a.id;
});
applyDroppedTaskLimit(sortedTasks);
return sortedTasks;
}

function getTaskSummary(tasks) {
return tasks.reduce(function(result, task) {
result.total += 1;
result.api += 1;
if (task.statusKey === 'read') {
result.sent += 1;
result.read += 1;
} else if (task.statusKey === 'sent') {
result.sent += 1;
} else if (task.statusKey === 'dropped') {
result.dropped += 1;
}
return result;
}, { total: 0, api: 0, sent: 0, read: 0, dropped: 0 });
}

function buildRecentTrendData(tasks, startDate, endDate) {
const dailyMap = new Map();
let currentDate = startDate;
while (currentDate <= endDate) {
dailyMap.set(currentDate, {
date: currentDate,
label: formatDateLabel(currentDate),
planned: 0,
actual: 0
});
currentDate = shiftDateValue(currentDate, 1);
}
tasks.forEach(function(task) {
if (!dailyMap.has(task.sendTimeValue)) {
dailyMap.set(task.sendTimeValue, {
date: task.sendTimeValue,
label: formatDateLabel(task.sendTimeValue),
planned: 0,
actual: 0
});
}
const dailySummary = dailyMap.get(task.sendTimeValue);
dailySummary.planned += 1;
if (task.statusKey !== 'dropped') {
dailySummary.actual += 1;
}
});
return Array.from(dailyMap.values()).sort(function(a, b) {
return a.date.localeCompare(b.date);
});
}

function buildDrugDistributionData(tasks) {
const distribution = tasks.reduce(function(result, task) {
result[task.drugName] = (result[task.drugName] || 0) + 1;
return result;
}, {});
return drugOptions.map(function(drugName) {
return {
name: drugName,
value: distribution[drugName] || 0,
itemStyle: { color: drugColors[drugName] }
};
});
}

function buildStaffRankingData(tasks) {
return statsStaffs.map(function(staffName) {
const value = tasks.filter(function(task) {
return task.staffName === staffName;
}).length;
return { name: staffName, value: value };
}).sort(function(a, b) {
return b.value - a.value;
}).slice(0, 5);
}

function createStatsRows(tasks) {
const groupMap = new Map();
tasks.forEach(function(task) {
const key = `${task.sendTimeValue}|${task.drugName}|${task.staffName}`;
if (!groupMap.has(key)) {
groupMap.set(key, {
date: task.sendTimeValue,
drugName: task.drugName,
staffName: task.staffName,
totalCount: 0,
successCount: 0,
failedCount: 0,
sourceTasks: []
});
}
const row = groupMap.get(key);
row.totalCount += 1;
if (task.statusKey === 'sent' || task.statusKey === 'read') {
row.successCount += 1;
} else {
row.failedCount += 1;
}
row.sourceTasks.push(task);
});
return Array.from(groupMap.values()).sort(function(a, b) {
return b.date.localeCompare(a.date) || b.totalCount - a.totalCount || a.drugName.localeCompare(b.drugName, 'zh-CN');
}).map(function(row, index) {
return Object.assign({
id: index + 1,
detailTitle: `${row.drugName} ${row.date} ${row.staffName} 执行详情`,
detailUrl: `https://demo.example.com/followup/stats/${6000 + index + 1}`
}, row);
});
}

function createPaginationButtons(container, currentPage, totalPages, buttonClass) {
if (!container) {
return;
}
const pages = [];
if (totalPages <= 7) {
for (let page = 1; page <= totalPages; page += 1) {
pages.push(page);
}
} else {
pages.push(1);
if (currentPage > 3) {
pages.push('ellipsis-start');
}
for (let page = Math.max(2, currentPage - 1); page <= Math.min(totalPages - 1, currentPage + 1); page += 1) {
pages.push(page);
}
if (currentPage < totalPages - 2) {
pages.push('ellipsis-end');
}
pages.push(totalPages);
}
container.innerHTML = pages.map(function(page) {
if (typeof page !== 'number') {
return '<span class="px-2 text-sm text-gray-400">...</span>';
}
const activeClass = page === currentPage
? 'border-blue-300 bg-blue-50 text-blue-700'
: 'border-gray-300 bg-white text-gray-700 hover:bg-gray-50';
return `<button type="button" class="${buttonClass} px-3 py-1 border rounded text-sm font-medium ${activeClass}" data-page="${page}">${page}</button>`;
}).join('');
}

if (headSelectAllCheckbox) {

}

const detailModal = document.getElementById('detail-modal');
const detailModalTitle = document.getElementById('detail-modal-title');
const detailModalLink = document.getElementById('detail-modal-link');
const detailModalClose = document.getElementById('detail-modal-close');
const detailModalConfirm = document.getElementById('detail-modal-confirm');

function openDetailModal(title, url) {
detailModalTitle.textContent = title;
detailModalLink.textContent = url;
detailModalLink.href = url;
detailModal.classList.remove('hidden');
detailModal.classList.add('flex');
}

function closeDetailModal() {
detailModal.classList.add('hidden');
detailModal.classList.remove('flex');
}

detailModalClose.addEventListener('click', closeDetailModal);
detailModalConfirm.addEventListener('click', closeDetailModal);
detailModal.addEventListener('click', function(event) {
if (event.target === detailModal) {
closeDetailModal();
}
});

function getStatsTotalPages() {
return Math.max(1, Math.ceil(statsDetailRows.length / statsState.pageSize));
}

function getStatsPageRows() {
const startIndex = (statsState.currentPage - 1) * statsState.pageSize;
return statsDetailRows.slice(startIndex, startIndex + statsState.pageSize);
}

function formatSuccessRate(row) {
return `${Math.round((row.successCount / row.totalCount) * 100)}%`;
}

function syncStatsPagination() {
const totalCount = statsDetailRows.length;
const totalPages = getStatsTotalPages();
const start = totalCount === 0 ? 0 : (statsState.currentPage - 1) * statsState.pageSize + 1;
const end = Math.min(statsState.currentPage * statsState.pageSize, totalCount);
if (statsPaginationInfo) {
statsPaginationInfo.textContent = `显示第 ${start} 到 ${end} 条记录，共 ${totalCount} 条`;
}
if (statsPrevPageButton) {
statsPrevPageButton.disabled = statsState.currentPage === 1;
}
if (statsNextPageButton) {
statsNextPageButton.disabled = statsState.currentPage === totalPages;
}
createPaginationButtons(statsPageButtons, statsState.currentPage, totalPages, 'stats-page-btn');
}

function renderStatsDetailTable() {
if (!statsDetailTableBody) {
return;
}
const pageRows = getStatsPageRows();
statsDetailTableBody.innerHTML = pageRows.map(function(row) {
return `
<tr data-stats-row-id="${row.id}">
<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${row.date}</td>
<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${row.drugName}</td>
<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${row.staffName}</td>
<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${row.totalCount}</td>
<td class="px-6 py-4 whitespace-nowrap text-sm text-green-600">${row.successCount}</td>
<td class="px-6 py-4 whitespace-nowrap text-sm">
<button type="button" class="stats-fail-btn text-red-600 hover:text-red-700 font-medium" data-row-id="${row.id}">${row.failedCount}</button>
</td>
<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${formatSuccessRate(row)}</td>
<td class="px-6 py-4 whitespace-nowrap text-sm">
<button type="button" class="stats-detail-btn text-blue-600 hover:text-blue-900" data-row-id="${row.id}">查看详情</button>
</td>
</tr>
`;
}).join('');
syncStatsPagination();
}

function goToStatsPage(page) {
const totalPages = getStatsTotalPages();
statsState.currentPage = Math.min(Math.max(page, 1), totalPages);
renderStatsDetailTable();
}

function buildMockMobile(row, index) {
const secondDigit = 3 + ((row.id + index) % 6);
const suffix = String(100000000 + row.id * 731 + index * 29).slice(-9);
return `1${secondDigit}${suffix}`;
}

function generateFailureUsers(row) {
if (row.failedUsers) {
return row.failedUsers;
}
const failedTasks = (row.sourceTasks || []).filter(function(task) {
return task.statusKey === 'dropped';
});
row.failedUsers = failedTasks.map(function(task) {
return {
nickname: task.wechatNickname,
wechatId: task.wechatId,
mobile: task.mobile
};
});
return row.failedUsers;
}

const failureModal = document.getElementById('failure-modal');
const failureModalBody = document.getElementById('failure-modal-body');
const failureModalSubtitle = document.getElementById('failure-modal-subtitle');
const failureModalClose = document.getElementById('failure-modal-close');
const failureModalConfirm = document.getElementById('failure-modal-confirm');

function openFailureModal(row) {
const users = generateFailureUsers(row);
failureModalSubtitle.textContent = `${row.date} / ${row.drugName} / ${row.staffName}，失败 ${row.failedCount} 条`;
failureModalBody.innerHTML = users.map(function(user, index) {
return `
<tr>
<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${index + 1}</td>
<td class="px-6 py-4 text-sm text-gray-900">${user.nickname} / ${user.wechatId}</td>
<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.mobile}</td>
</tr>
`;
}).join('');
failureModal.classList.remove('hidden');
failureModal.classList.add('flex');
}

function closeFailureModal() {
failureModal.classList.add('hidden');
failureModal.classList.remove('flex');
}

if (statsDetailTableBody) {
statsDetailTableBody.addEventListener('click', function(event) {
const failButton = event.target.closest('.stats-fail-btn');
if (failButton) {
const row = statsDetailRows.find(function(item) {
return item.id === Number(failButton.dataset.rowId);
});
if (row) {
openFailureModal(row);
}
return;
}
const detailButton = event.target.closest('.stats-detail-btn');
if (detailButton) {
const row = statsDetailRows.find(function(item) {
return item.id === Number(detailButton.dataset.rowId);
});
if (row) {
openDetailModal(row.detailTitle, row.detailUrl);
}
}
});
}

if (statsPrevPageButton) {
statsPrevPageButton.addEventListener('click', function() {
goToStatsPage(statsState.currentPage - 1);
});
}

if (statsNextPageButton) {
statsNextPageButton.addEventListener('click', function() {
goToStatsPage(statsState.currentPage + 1);
});
}

if (statsPageButtons) {
statsPageButtons.addEventListener('click', function(event) {
const button = event.target.closest('.stats-page-btn');
if (!button) {
return;
}
goToStatsPage(Number(button.dataset.page));
});
}

if (failureModalClose) {
failureModalClose.addEventListener('click', closeFailureModal);
}

if (failureModalConfirm) {
failureModalConfirm.addEventListener('click', closeFailureModal);
}

if (failureModal) {
failureModal.addEventListener('click', function(event) {
if (event.target === failureModal) {
closeFailureModal();
}
});
}

const exportButton = document.querySelector('button.bg-green-600');
if (exportButton) {
exportButton.addEventListener('click', function() {
alert('正在导出报表...');
});
}

function refreshDashboardData() {
refreshStatsRows();
syncTaskSummary();
renderTimeChart();
renderStatusChart();
renderDrugChart();
renderStaffChart();
renderStatsDetailTable();
}

syncTimeFilterDisplay();
syncStatsTimeFilterDisplay();
refreshDashboardData();
renderTaskTable();
});
</script>
</body>
</html>
